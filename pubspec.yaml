name: safeguardher
description: "SafeGuardHer - Women Safety & Empowerment Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase Core
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5

  # State Management
  provider: ^6.1.4

  # Location & Maps
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0
  flutter_map: any
  latlong2: ^0.9.1

  # Permissions
  permission_handler: ^11.4.0

  # Phone calls replacing telephony
  flutter_phone_direct_caller: ^2.1.1

  # Background Service
  flutter_background_service: ^5.0.6
  power_button_plugin:
    path: ./power_button_plugin

  # HTTP for API calls
  http: ^1.2.1

  # Local Storage
  shared_preferences: ^2.5.3

  # UI / UX
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  cached_network_image: ^3.4.1
  mgrs_dart: ^3.0.0
  proj4dart: ^3.0.0
  vector_math: ^2.3.0
  image_picker: ^1.1.2
  flutter_staggered_animations: ^1.1.1
  url_launcher: ^6.3.1
  lottie: ^3.3.1
  intl: ^0.20.2
  uuid: ^4.5.1

  # Voice Recording & Playback (Fake Call)
  record: ^6.2.0
  audioplayers: ^5.2.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

dependency_overrides:
  vector_math: ^2.3.0
  proj4dart: ^3.0.0
  mgrs_dart: ^3.0.0

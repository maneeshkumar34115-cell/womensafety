# ──────────────────────────────────────────────────────────────
# WomenSafe CI/CD Pipeline
# Triggers on push to main branch
# JOB 1: Build & test Flutter app, produce signed AAB
# JOB 2: Deploy backend via SSH + Docker on production server
# ──────────────────────────────────────────────────────────────

name: WomenSafe CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.32.0'  # Update to your desired stable version
  JAVA_VERSION: '17'

# ─── JOB 1: Flutter Build ─────────────────────────────────────
jobs:
  flutter-build:
    name: 🏗️ Flutter Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout Code ──
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Setup Java 17 (Required by Gradle) ──
      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── Setup Flutter ──
      - name: 🐦 Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── Verify Flutter installation ──
      - name: ✅ Flutter doctor
        run: flutter doctor -v

      # ── Get dependencies ──
      - name: 📦 Get dependencies
        run: flutter pub get

      # ── Analyze ──
      - name: 🔍 Run dart analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: false

      # ── Run tests ──
      - name: 🧪 Run tests
        run: flutter test
        continue-on-error: true  # Don't block build if no tests exist yet

      # ── Decode Keystore from GitHub Secret ──
      - name: 🔑 Decode Keystore
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/womensafe-release.jks

      # ── Create key.properties from GitHub Secret ──
      - name: 🔑 Create key.properties
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties

      # ── Build Release APK (split per ABI) ──
      - name: 📱 Build Release APK
        if: github.event_name == 'push'
        run: |
          flutter build apk --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info

      # ── Build Release AAB (for Play Store) ──
      - name: 📦 Build Release App Bundle (AAB)
        if: github.event_name == 'push'
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      # ── Upload APKs as artifacts ──
      - name: ⬆️ Upload APK artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
          if-no-files-found: warn

      # ── Upload AAB as artifact ──
      - name: ⬆️ Upload AAB artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: warn

      # ── Upload debug symbols (for crash reporting) ──
      - name: ⬆️ Upload debug symbols
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: build/debug-info/
          retention-days: 90
          if-no-files-found: warn

  # ─── JOB 2: Backend Deploy ─────────────────────────────────
  backend-deploy:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: flutter-build           # Only runs after flutter-build succeeds
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── SSH into server, pull code, rebuild Docker containers ──
      - name: 🔐 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e

            echo "═══════════════════════════════════════"
            echo "🚀 Starting WomenSafe Backend Deployment"
            echo "═══════════════════════════════════════"

            # Navigate to backend directory
            cd ~/womensafe-backend

            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart Docker containers
            echo "🐳 Rebuilding Docker containers..."
            docker compose down --remove-orphans
            docker compose up --build -d

            # Wait for containers to boot up
            echo "⏳ Waiting for services to start..."
            sleep 10

            # Verify health endpoint
            echo "🏥 Checking health endpoint..."
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health || echo "000")

            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ Health check PASSED (HTTP $HEALTH_STATUS)"
            else
              echo "❌ Health check FAILED (HTTP $HEALTH_STATUS)"
              echo "📋 Docker container logs:"
              docker compose logs --tail=50
              exit 1
            fi

            # Show running containers
            echo "📊 Running containers:"
            docker compose ps

            echo "═══════════════════════════════════════"
            echo "✅ Deployment completed successfully!"
            echo "═══════════════════════════════════════"

      # ── Verify deployment from GitHub runner (external check) ──
      - name: 🌐 External health check
        run: |
          echo "Verifying deployment externally..."
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.womensafe.app/api/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ External health check PASSED"
          else
            echo "⚠️ External health check returned HTTP $STATUS (may need DNS propagation)"
          fi

  # ─── JOB 3: Notify on Failure ──────────────────────────────
  notify-failure:
    name: 🔔 Failure Notification
    runs-on: ubuntu-latest
    needs: [flutter-build, backend-deploy]
    if: failure()

    steps:
      - name: 📢 Create failure summary
        run: |
          echo "## ❌ WomenSafe CI/CD Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  # ─── JOB 4: Success Summary ────────────────────────────────
  notify-success:
    name: ✅ Success Summary
    runs-on: ubuntu-latest
    needs: [flutter-build, backend-deploy]
    if: success()

    steps:
      - name: 📢 Create success summary
        run: |
          echo "## ✅ WomenSafe CI/CD Pipeline Succeeded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 Release APKs (split-per-abi)" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Release AAB (Play Store ready)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐛 Debug symbols (for crash reports)" >> $GITHUB_STEP_SUMMARY
